<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orion Base Control</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="Orion.Dashboard.styles.css" rel="stylesheet" /> -->
</head>

<body class="bg-background text-primary">
    <div id="app" class="min-h-screen w-full">
        <div class="animate-pulse text-secondary text-sm font-medium tracking-widest uppercase">Initializing Control Plane...</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.orion-dropdown')) {
                DotNet.invokeMethodAsync('Orion.Dashboard', 'CloseAllDropdowns');
            }
        });
    </script>
</body>

</html>
